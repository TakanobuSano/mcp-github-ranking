name: Update MCP repositories ranking

on:
  workflow_dispatch:
    inputs:
      post_teams:
        description: "Teamsに投稿するか"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      trigger_source:
        description: "起動元"
        required: false
        default: "manual"

  # GitHub Actions単体で毎日更新したい場合は、以下のコメントアウトを外してください。
  # 外部cronサービスだけで起動する場合は、このままで問題ありません。
  # schedule:
  #   - cron: "17 0 * * *"

concurrency:
  group: update-mcp-repositories-ranking
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      DISPLAY_RESULTS: "100"
      SAVE_RESULTS: "500"
      MAX_PAGES_PER_QUERY: "5"
      PER_PAGE: "100"
      OUTPUT_RETENTION_DAYS: "30"

      QIITA_PRIVATE: "false"
      QIITA_ORGANIZATION_URL_NAME: "4qualia"
      QIITA_TITLE: "【毎日更新】Claude Code向けスキル・MCP・関連ツール人気ランキングTOP100をGitHubスターで自動集計"

      QIITA_TRENDING_PRIVATE: "false"
      QIITA_TRENDING_TITLE: "【毎日更新】Claude Code向けスキル・MCP・関連ツール週間トレンドTOP30をGitHubから自動集計"
      TRENDING_PERIOD_DAYS: "7"
      TRENDING_DISPLAY_RESULTS: "30"

      PREPARE_CLAUDE_INPUT: "true"
      README_TARGET_COUNT: "30"
      README_MAX_CHARS_FOR_CLAUDE_INPUT: "30000"

      GENERATE_CLAUDE_EXPLANATIONS: "true"
      EXPLANATION_TARGET_COUNT: "30"
      ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
      ANTHROPIC_MAX_TOKENS: "700"
      EXPLANATION_PROMPT_VERSION: "v1"
      FORCE_REGENERATE_EXPLANATIONS: "false"
      CLAUDE_API_SLEEP_SECONDS: "25.0"

      TEAMS_DISPLAY_RESULTS: "10"
      TEAMS_TITLE: "Claude Code向けスキル・MCP・関連ツール週間トレンド Top10"
      QIITA_TRENDING_URL: "https://qiita.com/4q_sano/items/cc27d3564a657046242a"
      GITHUB_REPOSITORY_URL: "https://github.com/TakanobuSano/mcp-github-ranking"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade requests

      - name: Update MCP repository ranking files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_mcp_repos.py

      - name: Commit generated ranking files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md output

          if git diff --cached --quiet; then
            echo "No generated file changes."
          else
            git commit -m "Update MCP repository ranking"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Update Qiita trending ranking article with Claude explanations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          QIITA_TRENDING_ITEM_ID: ${{ secrets.QIITA_TRENDING_ITEM_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${QIITA_TOKEN}" ] || [ -z "${QIITA_TRENDING_ITEM_ID}" ]; then
            echo "Skip Qiita trending ranking update because QIITA_TOKEN or QIITA_TRENDING_ITEM_ID is not set."
          else
            python scripts/update_qiita_trending.py
          fi

      - name: Commit README cache, Claude input, and Claude explanations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/readmes output/claude_inputs output/claude_explanations

          if git diff --cached --quiet; then
            echo "No README cache, Claude input, or Claude explanation changes."
          else
            git commit -m "Generate Claude explanation cache"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Update Qiita popular ranking article
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          QIITA_ITEM_ID: ${{ secrets.QIITA_ITEM_ID }}
        run: |
          if [ -z "${QIITA_TOKEN}" ] || [ -z "${QIITA_ITEM_ID}" ]; then
            echo "Skip Qiita popular ranking update because QIITA_TOKEN or QIITA_ITEM_ID is not set."
          else
            python scripts/update_qiita.py
          fi

      - name: Check Teams posting day
        id: teams_day
        run: |
          day_of_week=$(TZ=Asia/Tokyo date +%u)
          echo "JST day_of_week=${day_of_week}"

          if [ "${day_of_week}" = "1" ]; then
            echo "should_post=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_post=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Post MCP trending ranking summary to Teams
        if: steps.teams_day.outputs.should_post == 'true' && (github.event_name == 'schedule' || github.event.inputs.post_teams == 'true')
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL}" ]; then
            echo "Skip Teams post because TEAMS_WEBHOOK_URL is not set."
          else
            python scripts/post_to_teams.py
          fi
