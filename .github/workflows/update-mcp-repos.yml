name: Update MCP GitHub Repository Ranking

on:
  workflow_dispatch:
  schedule:
    # JST 06:15 に実行したい場合は、UTCでは前日の21:15。
    - cron: "15 21 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAX_PAGES_PER_QUERY: "2"
      PER_PAGE: "100"
      MAX_RESULTS: "100"
      OUTPUT_RETENTION_DAYS: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update MCP repositories ranking
        run: |
          python scripts/update_mcp_repos.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md output/
          git commit -m "Update MCP repository ranking"
          git push
