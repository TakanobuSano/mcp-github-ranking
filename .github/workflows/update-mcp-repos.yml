name: Update MCP GitHub Repository Ranking

on:
  workflow_dispatch:
  #schedule:
    # 毎日 JST 06:15 に実行
    # GitHub Actions の cron は UTC 基準なので、JST 06:15 = UTC 21:15
    #- cron: "15 21 * * *"

permissions:
  contents: write

concurrency:
  group: update-mcp-repos
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GitHub Search API の取得設定
      MAX_PAGES_PER_QUERY: "2"
      PER_PAGE: "100"
      MAX_RESULTS: "50"

      # output/ 配下の日付付きファイルを最新30日分だけ残す
      OUTPUT_RETENTION_DAYS: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update MCP repositories ranking
        run: |
          python scripts/update_mcp_repos.py

      - name: Update Qiita article
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          QIITA_ITEM_ID: ${{ secrets.QIITA_ITEM_ID }}
          QIITA_TITLE: "Claude Code向けMCP・関連ツール候補ランキング【GitHub Search APIで毎日自動更新】"

          # 最初は true 推奨
          # Qiita記事の更新内容を確認して問題なければ false に変更
          QIITA_PRIVATE: "false"
        run: |
          python scripts/update_qiita.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md output/
          git commit -m "Update MCP repository ranking"
          git push
